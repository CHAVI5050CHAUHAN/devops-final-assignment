services:

  nginx:
    image: nginx:1.25
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./php:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

    networks:
      - app-network

  php:
    build: ./php
    container_name: php-fpm

    volumes:
      - ./php:/var/www/html

    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql

    env_file:
      - .env

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql

    depends_on:
      - mysql

    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
